<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <title>404 · Sociomemory</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f4faf6;
        --panel: rgba(255, 255, 255, 0.74);
        --ink: #051a0e;
        --muted: #4e6659;
        --line: rgba(5, 26, 14, 0.1);
        --accent: #047857;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        min-height: 100%;
        margin: 0;
      }

      body {
        display: grid;
        place-items: center;
        overflow: hidden;
        background:
          radial-gradient(circle at var(--x, 50%) var(--y, 50%), rgba(16, 185, 129, 0.12), transparent 24rem),
          linear-gradient(var(--line) 1px, transparent 1px),
          linear-gradient(90deg, var(--line) 1px, transparent 1px),
          var(--bg);
        background-size: auto, 32px 32px, 32px 32px, auto;
        color: var(--ink);
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      main {
        width: min(420px, calc(100vw - 2rem));
        border: 1px solid var(--line);
        background: var(--panel);
        padding: 2rem;
        backdrop-filter: blur(16px);
        transform: translate3d(calc(var(--dx, 0) * 1px), calc(var(--dy, 0) * 1px), 0);
        transition: transform 180ms ease;
      }

      .eyebrow {
        color: var(--accent);
        font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
        font-size: 0.68rem;
        font-weight: 800;
        letter-spacing: 0.16em;
        text-transform: uppercase;
      }

      h1 {
        margin: 0.7rem 0 0;
        font-size: clamp(3.5rem, 18vw, 6.5rem);
        line-height: 0.85;
        letter-spacing: -0.06em;
      }

      p {
        margin: 1rem 0 1.5rem;
        color: var(--muted);
        font-size: 0.95rem;
        line-height: 1.65;
      }

      a {
        display: inline-flex;
        align-items: center;
        min-height: 2.5rem;
        border: 1px solid var(--ink);
        background: var(--ink);
        color: var(--bg);
        padding: 0 1rem;
        font-size: 0.8rem;
        font-weight: 800;
        text-decoration: none;
      }

      a:hover {
        background: var(--accent);
        border-color: var(--accent);
      }
    </style>
  </head>
  <body>
    <main id="card">
      <div class="eyebrow">sociomemory · missing node</div>
      <h1>404</h1>
      <p>This route is not part of the public demo graph. Return to the dashboard to explore the seeded memory layer.</p>
      <a href="/">Back to dashboard</a>
    </main>
    <script>
      const root = document.documentElement;
      const card = document.getElementById("card");

      window.addEventListener("pointermove", (event) => {
        const x = Math.round((event.clientX / window.innerWidth) * 100);
        const y = Math.round((event.clientY / window.innerHeight) * 100);
        root.style.setProperty("--x", `${x}%`);
        root.style.setProperty("--y", `${y}%`);
        card.style.setProperty("--dx", ((x - 50) / 18).toFixed(2));
        card.style.setProperty("--dy", ((y - 50) / 18).toFixed(2));
      });
    </script>
  </body>
</html>
