[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "sociomemory"
version = "0.1.0"
description = "Graph memory engine for social context inference — built for VIRa AI Coach"
readme = "README.md"
requires-python = ">=3.11"
license = { text = "MIT" }
authors = [{ name = "Nirvana" }]
keywords = ["memory", "graph", "neo4j", "faiss", "ai", "coaching", "ndd"]

dependencies = [
    "neo4j>=5.0.0",
    "faiss-cpu>=1.7.4",
    "pydantic>=2.0.0",
    "httpx>=0.27.0",
    "python-dotenv>=1.0.0",
    "google-genai>=1.0.0",
    "openai>=1.0.0",
    "numpy>=1.24.0",
    "aiofiles>=23.0.0",
]

[project.optional-dependencies]
online = [
    "exa-py>=1.0.0",
]
geo = [
    "geopandas>=0.14.0",
    "shapely>=2.0.0",
]
dev = [
    "pytest>=8.0.0",
    "pytest-asyncio>=0.23.0",
    "testcontainers[neo4j]>=4.0.0",
    "ruff>=0.4.0",
]
all = ["sociomemory[geo]"]

[tool.hatch.build.targets.wheel]
packages = ["sociomemory"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]

[tool.ruff]
target-version = "py311"
line-length = 100
